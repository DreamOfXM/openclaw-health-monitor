<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Health Monitor - 心跳监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <style>
        .heartbeat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .card {
            background: var(--card-bg, #1a1a2e);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary, #fff);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-healthy { background: #10b981; color: #fff; }
        .status-degraded { background: #f59e0b; color: #fff; }
        .status-error { background: #ef4444; color: #fff; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-item {
            background: var(--stat-bg, #16213e);
            padding: 12px;
            border-radius: 8px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary, #94a3b8);
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary, #fff);
        }
        
        .task-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--stat-bg, #16213e);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-id {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary, #fff);
        }
        
        .task-phase {
            font-size: 12px;
            color: var(--text-secondary, #94a3b8);
        }
        
        .task-progress {
            width: 60px;
            text-align: right;
        }
        
        .progress-bar {
            height: 6px;
            background: var(--progress-bg, #374151);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            background: #3b82f6;
            transition: width 0.3s ease;
        }
        
        .phase-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .phase-table th,
        .phase-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color, #374151);
        }
        
        .phase-table th {
            color: var(--text-secondary, #94a3b8);
            font-size: 12px;
            font-weight: 500;
        }
        
        .phase-table td {
            color: var(--text-primary, #fff);
        }
        
        .btn-recover {
            padding: 6px 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-recover:hover {
            background: #2563eb;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary, #94a3b8);
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: var(--btn-bg, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">Health Monitor</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">总览</a>
                <a href="/explore" class="nav-item">详情</a>
                <a href="/manage" class="nav-item">管理</a>
                <a href="/heartbeat" class="nav-item active">心跳监控</a>
            </nav>
            <div class="header-actions">
                <button id="refresh-btn" class="refresh-btn">🔄 刷新</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="heartbeat-grid">
            <!-- 状态概览 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📊 监控状态</span>
                    <span id="health-status-badge" class="status-badge status-healthy">健康</span>
                </div>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">活跃任务</div>
                        <div id="active-tasks" class="stat-value">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">总任务数</div>
                        <div id="total-tasks" class="stat-value">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">超时任务</div>
                        <div id="timeout-tasks" class="stat-value">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">阻塞任务</div>
                        <div id="blocked-tasks" class="stat-value">0</div>
                    </div>
                </div>
            </div>

            <!-- 心跳阶段配置 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">⏱️ 心跳阶段配置</span>
                </div>
                <table class="phase-table">
                    <thead>
                        <tr>
                            <th>阶段</th>
                            <th>心跳间隔</th>
                            <th>超时阈值</th>
                        </tr>
                    </thead>
                    <tbody id="phase-table-body">
                        <tr><td colspan="3" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 超时任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">⚠️ 超时任务</span>
                    <span id="timeout-count" class="status-badge status-degraded">0</span>
                </div>
                <div id="timeout-task-list" class="task-list">
                    <div class="empty-state">暂无超时任务</div>
                </div>
            </div>

            <!-- 最近心跳 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">💓 最近心跳</span>
                </div>
                <div id="heartbeat-list" class="task-list">
                    <div class="empty-state">暂无心跳记录</div>
                </div>
            </div>

            <!-- Guardrail 规则 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">🛡️ Guardrail 规则</span>
                </div>
                <table class="phase-table">
                    <thead>
                        <tr>
                            <th>规则名称</th>
                            <th>动作</th>
                            <th>最大重试</th>
                        </tr>
                    </thead>
                    <tbody id="guardrail-rules-body">
                        <tr><td colspan="3" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 状态转换 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">🔄 状态转换规则</span>
                </div>
                <table class="phase-table">
                    <thead>
                        <tr>
                            <th>从状态</th>
                            <th>触发器</th>
                            <th>到状态</th>
                        </tr>
                    </thead>
                    <tbody id="transitions-body">
                        <tr><td colspan="3" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 加载状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/v2/heartbeat/status');
                const data = await response.json();
                
                if (data.success) {
                    const result = data.data;
                    
                    // 更新统计
                    document.getElementById('active-tasks').textContent = result.active_tasks || 0;
                    document.getElementById('total-tasks').textContent = result.total_tasks || 0;
                    document.getElementById('timeout-tasks').textContent = result.timeout_tasks?.length || 0;
                    document.getElementById('blocked-tasks').textContent = result.blocked_tasks?.length || 0;
                    
                    // 更新状态徽章
                    const badge = document.getElementById('health-status-badge');
                    badge.textContent = result.health_status === 'healthy' ? '健康' : '降级';
                    badge.className = 'status-badge ' + (result.health_status === 'healthy' ? 'status-healthy' : 'status-degraded');
                    
                    // 更新超时任务列表
                    updateTimeoutTasks(result.timeout_tasks || []);
                }
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }
        
        // 加载心跳阶段配置
        async function loadPhases() {
            try {
                const response = await fetch('/api/v2/heartbeat/phases');
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('phase-table-body');
                    tbody.innerHTML = data.data.phases.map(p => `
                        <tr>
                            <td>${p.phase}</td>
                            <td>${p.interval_seconds}秒</td>
                            <td>${p.timeout_seconds}秒</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载阶段配置失败:', error);
            }
        }
        
        // 加载最近心跳
        async function loadHeartbeats() {
            try {
                const response = await fetch('/api/v2/heartbeat/heartbeats?limit=10');
                const data = await response.json();
                
                if (data.success) {
                    const container = document.getElementById('heartbeat-list');
                    const heartbeats = data.data.heartbeats || [];
                    
                    if (heartbeats.length === 0) {
                        container.innerHTML = '<div class="empty-state">暂无心跳记录</div>';
                    } else {
                        container.innerHTML = heartbeats.map(h => `
                            <div class="task-item">
                                <div class="task-info">
                                    <div class="task-id">${h.task_id || '--'}</div>
                                    <div class="task-phase">${h.phase || '--'} | ${h.session_key || '--'}</div>
                                </div>
                                <div class="task-progress">
                                    <span>${h.progress || 0}%</span>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${h.progress || 0}%"></div>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('加载心跳记录失败:', error);
            }
        }
        
        // 加载 Guardrail 规则
        async function loadGuardrailRules() {
            try {
                const response = await fetch('/api/v2/heartbeat/guardrail/rules');
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('guardrail-rules-body');
                    tbody.innerHTML = data.data.rules.map(r => `
                        <tr>
                            <td>${r.name}</td>
                            <td>${r.action}</td>
                            <td>${r.max_attempts}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载 Guardrail 规则失败:', error);
            }
        }
        
        // 加载状态转换
        async function loadTransitions() {
            try {
                const response = await fetch('/api/v2/heartbeat/guardrail/transitions');
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('transitions-body');
                    tbody.innerHTML = data.data.transitions.map(t => `
                        <tr>
                            <td>${t.from_state}</td>
                            <td>${t.trigger}</td>
                            <td>${t.to_state}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载状态转换失败:', error);
            }
        }
        
        // 更新超时任务列表
        function updateTimeoutTasks(tasks) {
            const container = document.getElementById('timeout-task-list');
            const countBadge = document.getElementById('timeout-count');
            
            countBadge.textContent = tasks.length;
            countBadge.className = 'status-badge ' + (tasks.length > 0 ? 'status-degraded' : 'status-healthy');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无超时任务</div>';
            } else {
                container.innerHTML = tasks.map(t => `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-id">${t.task_id}</div>
                            <div class="task-phase">${t.phase} | 超时 ${t.timeout_seconds}秒</div>
                        </div>
                        <button class="btn-recover" onclick="recoverTask('${t.task_id}')">恢复</button>
                    </div>
                `).join('');
            }
        }
        
        // 恢复任务
        async function recoverTask(taskId) {
            try {
                const response = await fetch(`/api/v2/heartbeat/recover/${taskId}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert(`任务 ${taskId} 恢复成功: ${data.data.action}`);
                    loadStatus();
                } else {
                    alert(`任务 ${taskId} 恢复失败: ${data.data?.message || data.error}`);
                }
            } catch (error) {
                alert('恢复失败: ' + error.message);
            }
        }
        
        // 刷新所有数据
        async function refreshAll() {
            await Promise.all([
                loadStatus(),
                loadPhases(),
                loadHeartbeats(),
                loadGuardrailRules(),
                loadTransitions(),
            ]);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshAll();
            
            // 刷新按钮
            document.getElementById('refresh-btn').addEventListener('click', refreshAll);
            
            // 自动刷新（每30秒）
            setInterval(refreshAll, 30000);
        });
    </script>
</body>
</html>
