# OpenClaw 健康监控中心配置
# =========================================

# ========== 告警通知配置 ==========
# 钉钉 Webhook（请放到 config.local.conf 或环境变量）
DINGTALK_WEBHOOK=""

# 飞书 Webhook（留空则不启用）
FEISHU_WEBHOOK=""

# Webhook 域名白名单（默认允许钉钉与飞书官方域名）
WEBHOOK_ALLOWED_HOSTS="oapi.dingtalk.com,api.dingtalk.com,open.feishu.cn"

# macOS 系统通知
ENABLE_MAC_NOTIFY=true

# ========== 监控配置 ==========
# 检查间隔（秒）
CHECK_INTERVAL=30

# 健康检查重试次数
HEALTH_CHECK_RETRIES=3
HEALTH_CHECK_DELAY=5

# Gateway 端口
GATEWAY_PORT=18789

# 慢响应阈值（秒）
SLOW_RESPONSE_THRESHOLD=30

# 无回复/卡住阈值（秒）
STALLED_RESPONSE_THRESHOLD=90

# 长时间无新进展后，主动进度推送阈值（秒）
PROGRESS_PUSH_INTERVAL=180

# 进度推送冷却期（秒）
PROGRESS_PUSH_COOLDOWN=300

# 长时间无新进展后，升级播报阈值（秒）
PROGRESS_ESCALATION_INTERVAL=600

# 超过该时长的旧任务不再向用户补发泛化进度提醒（秒）
GUARDIAN_STALE_TASK_MAX_AGE=3600

# 守护会话追问超时、重试和降级配置
GUARDIAN_FOLLOWUP_TIMEOUT=120
GUARDIAN_FOLLOWUP_RETRIES=2
GUARDIAN_FOLLOWUP_RETRY_DELAY=3
GUARDIAN_BLOCKED_COOLDOWN=900
GUARDIAN_BLOCKED_NOTICE_INTERVAL=1800

# ========== 任务注册表 ==========
# 是否启用守护层任务注册表
ENABLE_TASK_REGISTRY=true

# 每个会话默认只保留 1 个当前活动任务，其余转后台
TASK_REGISTRY_MAX_ACTIVE=1

# 任务注册表默认保留的最近任务数量
TASK_REGISTRY_RETENTION=100

# 任务控制面：弱证据任务在超过宽限期后，守护者会要求给出结构化回执或明确阻塞
TASK_CONTROL_RECEIPT_GRACE=180
TASK_CONTROL_FOLLOWUP_COOLDOWN=300
TASK_CONTROL_MAX_ATTEMPTS=2
TASK_CONTROL_BLOCK_TIMEOUT=900

# 外置任务合同配置文件（留空则使用仓库内 task_contracts.json）
TASK_CONTRACTS_FILE=""

# ========== 自动更新配置 ==========
# 自动更新开关（默认关闭）
AUTO_UPDATE=false

# 自动重启（建议开启）
AUTO_RESTART=true

# 是否允许 destructive recovery（git stash / reset --hard）
# 开源默认关闭，只有在你明确接受风险时才打开
ENABLE_DESTRUCTIVE_RECOVERY=false

# 是否允许配置快照恢复（推荐开启）
ENABLE_SNAPSHOT_RECOVERY=true

# 保留多少份最近快照
SNAPSHOT_RETENTION=10

# 更新频道：stable | beta | dev
UPDATE_CHANNEL=stable

# ========== 告警阈值 ==========
CPU_THRESHOLD=90
MEMORY_THRESHOLD=85

# 告警去重时间（秒）
ALERT_DEDUP_INTERVAL=600

# ========== OpenClaw 路径 ==========
OPENCLAW_HOME="$HOME/.openclaw"
OPENCLAW_CODE="$HOME/openclaw-workspace/openclaw"
OPENCLAW_OFFICIAL_CODE="$HOME/openclaw-workspace/openclaw-official"
OPENCLAW_OFFICIAL_STATE="$HOME/.openclaw-official"
OPENCLAW_OFFICIAL_PORT=19001
OPENCLAW_OFFICIAL_REF="origin/main"
OPENCLAW_OFFICIAL_AUTO_UPDATE=false
OPENCLAW_OFFICIAL_UPDATE_HOUR=4
OPENCLAW_OFFICIAL_UPDATE_MINUTE=30
ACTIVE_OPENCLAW_ENV="primary"
